<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibePalette | لوحة ألوان الذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.5s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 10px; }
        
        /* تأثير التوهج الملحمي */
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
            border-radius: 50%;
            transition: all 0.8s ease-in-out;
        }
        .is-dark .glow-bg { opacity: 0.25; filter: blur(150px); }

        @media (min-width: 1024px) { .hero-title { font-size: 4rem !important; } }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden"
      :class="isDark ? 'is-dark' : ''"
      x-data="themePreview()"
      :dir="lang === 'ar' ? 'rtl' : 'ltr'"
      :style="`background-color: ${currentBg}; color: ${currentText}`"
      x-effect="document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr'; document.documentElement.lang = lang;">

    <div class="glow-bg" :style="`background: radial-gradient(circle, ${currentPalette.grad.from}, ${currentPalette.grad.to})`"></div>

    <header class="w-full z-50 shadow-sm backdrop-blur-xl border-b flex-shrink-0"
            style="border-color: rgba(128, 128, 128, 0.15); background-color: rgba(128, 128, 128, 0.05);">
        <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                🎨 <span class="tracking-tight">VibePalette</span> 
                <span class="text-sm opacity-60" x-text="`(${palettes.length})`"></span>
            </h1>
            
            <div class="flex items-center gap-2 md:gap-4">
                <button @click="toggleLang" class="px-4 py-2 rounded-full font-bold text-sm border transition shadow-sm hover:scale-105" :style="`border-color: ${currentBtn}; color: ${currentBtn}`" x-text="lang === 'ar' ? 'EN' : 'عربي'"></button>
                <button @click="toggleDarkMode" class="w-10 h-10 rounded-full flex items-center justify-center border transition shadow-sm" :style="`border-color: ${currentBtn}; color: ${currentBtn}`" x-text="isDark ? '☀️' : '🌙'"></button>
            </div>
        </div>
    </header>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        <aside class="w-full md:w-[320px] lg:w-[350px] flex-shrink-0 border-b md:border-b-0 md:border-x flex overflow-x-auto md:overflow-y-auto md:flex-col hide-scrollbar p-3 md:p-5 gap-3 md:gap-4 z-40" style="border-color: rgba(128, 128, 128, 0.1);">
            <template x-for="p in palettes" :key="p.id">
                <button @click="currentPalette = p"
                        class="flex-shrink-0 w-32 md:w-full p-3 md:p-4 rounded-2xl border transition-all duration-300 relative overflow-hidden text-start"
                        :class="currentPalette.id === p.id ? 'shadow-xl scale-105 border-transparent' : 'border-gray-500 border-opacity-20 opacity-70'"
                        :style="currentPalette.id === p.id ? `background: ${p.grad.from}20; border-color: ${p.grad.from}` : ''">
                    <div class="text-xs md:text-base font-bold mb-2 truncate" x-text="lang === 'ar' ? p.nameAr : p.nameEn"></div>
                    <div class="h-2 w-full rounded-full" :style="`background: linear-gradient(to left, ${p.grad.from}, ${p.grad.to})`"></div>
                </button>
            </template>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-5xl mx-auto space-y-10">
                <section class="text-center py-10">
                    <h2 class="hero-title text-4xl md:text-7xl font-black leading-tight">
                        <span x-text="lang === 'ar' ? 'صمم بذكاء' : 'Vibe Coding'"></span> <br>
                        <span class="text-transparent bg-clip-text" :style="`background-image: linear-gradient(to left, ${currentPalette.grad.from}, ${currentPalette.grad.to})`"
                              x-text="lang === 'ar' ? 'بألوان متناسقة' : 'With AI Colors'"></span>
                    </h2>
                </section>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 relative z-10">
                    <div class="space-y-6">
                        <div class="p-6 rounded-3xl border shadow-sm backdrop-blur-md" style="border-color: rgba(128,128,128,0.15); background: rgba(128,128,128,0.05)">
                            <div class="flex flex-wrap gap-3">
                                <button class="px-6 py-3 rounded-xl font-bold text-white shadow-lg" :style="`background: linear-gradient(to right, ${currentPalette.grad.from}, ${currentPalette.grad.to})`">Primary</button>
                                <button class="px-6 py-3 rounded-xl font-bold border-2" :style="`border-color: ${currentBtn}; color: ${currentBtn}`">Outline</button>
                            </div>
                        </div>
                        <div class="rounded-3xl border overflow-hidden backdrop-blur-md p-5 space-y-4" style="border-color: rgba(128,128,128,0.15); background: rgba(128,128,128,0.05)">
                            <div class="w-full bg-gray-500 bg-opacity-10 h-2 rounded-full overflow-hidden"><div class="h-full" :style="`background: ${currentBtn}; width: 70%`"></div></div>
                        </div>
                    </div>
                    <div class="p-8 rounded-[2.5rem] border-2 flex flex-col justify-between backdrop-blur-sm" :style="`border-color: ${currentPalette.grad.from}44; background: ${currentPalette.grad.from}05`">
                        <div class="space-y-6">
                            <div class="h-48 rounded-3xl shadow-2xl" :style="`background: linear-gradient(135deg, ${currentPalette.grad.from}, ${currentPalette.grad.to})`"></div>
                            <h4 class="text-2xl font-black">AI Experience</h4>
                        </div>
                    </div>
                </div>

                <section class="p-10 border-t text-center space-y-6" style="border-color: rgba(128, 128, 128, 0.1);">
                    <div class="text-center">
                        <h3 class="font-bold text-2xl mb-2" x-text="lang === 'ar' ? 'نسخ البرومبت الذكي' : 'Copy Smart Prompt'"></h3>
                        <p class="opacity-60 text-sm" x-text="lang === 'ar' ? 'انسخ الوصف الكامل ليشرح للذكاء الاصطناعي كيفية تطبيق التصميم.' : 'Copy full guide to teach AI how to apply the design.'"></p>
                    </div>
                    <button @click="copyPrompt" 
                            class="w-full md:w-auto px-16 py-5 rounded-2xl font-black text-xl shadow-2xl transition-all"
                            :class="copySuccess ? 'bg-green-600 text-white animate-bounce' : 'text-white'"
                            :style="!copySuccess ? `background: ${currentBtn}` : ''">
                        <span x-text="copySuccess ? 'Copied Successfully!' : (lang === 'ar' ? 'نسخ البرومبت المتكامل' : 'Copy Smart Prompt')"></span>
                    </button>
                </section>
            </div>
        </main>
    </div>

                    { id: 7, nameAr: 'رمال الصحراء', nameEn: 'Desert Sands', light: { bg: '#FAF4ED', text: '#5C2D16', btn: '#D97757' }, dark: { bg: '#1A0D06', text: '#F3E8DC', btn: '#E28C6E' }, grad: { from: '#C05C3A', to: '#EAB096' } },

                    { id: 18, nameAr: 'جليد القطب', nameEn: 'Polar Ice', light: { bg: '#F0F9FF', text: '#0C4A6E', btn: '#38BDF8' }, dark: { bg: '#021A2B', text: '#E0F2FE', btn: '#7DD3FC' }, grad: { from: '#0284C7', to: '#7DD3FC' } },
                    { id: 19, nameAr: 'حمم بركانية', nameEn: 'Volcanic Lava', light: { bg: '#FFF1F2', text: '#881337', btn: '#E11D48' }, dark: { bg: '#1A0202', text: '#FFE4E6', btn: '#F43F5E' }, grad: { from: '#BE123C', to: '#FB7185' } },
                    { id: 20, nameAr: 'خوخ مخملي', nameEn: 'Velvet Peach', light: { bg: '#FFF6F5', text: '#5C2723', btn: '#F87171' }, dark: { bg: '#1A0B0A', text: '#FEE2E2', btn: '#FCA5A5' }, grad: { from: '#EF4444', to: '#FCA5A5' } },
                    { id: 21, nameAr: 'موجة كلاسيكية', nameEn: 'Classic Wave', light: { bg: '#F5F3FF', text: '#2E1065', btn: '#8B5CF6' }, dark: { bg: '#0D051A', text: '#EDE9FE', btn: '#A78BFA' }, grad: { from: '#7C3AED', to: '#C4B5FD' } },
                    { id: 22, nameAr: 'طحالب وخشب', nameEn: 'Moss & Wood', light: { bg: '#FAFAF9', text: '#44403C', btn: '#65A30D' }, dark: { bg: '#100E0D', text: '#F5F5F4', btn: '#84CC16' }, grad: { from: '#4D7C0F', to: '#A3E635' } },
                    { id: 23, nameAr: 'غزل البنات', nameEn: 'Cotton Candy', light: { bg: '#FDF2F8', text: '#831843', btn: '#F472B6' }, dark: { bg: '#1A050D', text: '#FCE7F3', btn: '#F9A8D4' }, grad: { from: '#EC4899', to: '#FBCFE8' } },
                    { id: 24, nameAr: 'الساعة الذهبية', nameEn: 'Golden Hour', light: { bg: '#FFFBEB', text: '#78350F', btn: '#D97706' }, dark: { bg: '#1A0C02', text: '#FEF3C7', btn: '#F59E0B' }, grad: { from: '#B45309', to: '#FCD34D' } },
                    { id: 25, nameAr: 'فضاء سحيق', nameEn: 'Deep Space', light: { bg: '#F8FAFC', text: '#0F172A', btn: '#475569' }, dark: { bg: '#01040D', text: '#F8FAFC', btn: '#94A3B8' }, grad: { from: '#334155', to: '#CBD5E1' } },
                    { id: 26, nameAr: 'نعناع وشوكولاتة', nameEn: 'Mint & Choco', light: { bg: '#ECFDF5', text: '#064E3B', btn: '#10B981' }, dark: { bg: '#021A14', text: '#D1FAE5', btn: '#34D399' }, grad: { from: '#059669', to: '#6EE7B7' } },
                    { id: 27, nameAr: 'زهرة الأوركيد', nameEn: 'Orchid Flower', light: { bg: '#FAF5FF', text: '#581C87', btn: '#D946EF' }, dark: { bg: '#1A021A', text: '#F3E8FF', btn: '#E879F9' }, grad: { from: '#A21CAF', to: '#F0ABFC' } },
                    { id: 28, nameAr: 'صدأ وتيل', nameEn: 'Rust & Teal', light: { bg: '#F0FDFA', text: '#134E4A', btn: '#0D9488' }, dark: { bg: '#021A1A', text: '#CCFBF1', btn: '#14B8A6' }, grad: { from: '#0F766E', to: '#5EEAD4' } },
                    { id: 29, nameAr: 'صخر وورد', nameEn: 'Rock & Rose', light: { bg: '#F1F5F9', text: '#334155', btn: '#F43F5E' }, dark: { bg: '#05081A', text: '#E2E8F0', btn: '#FB7185' }, grad: { from: '#E11D48', to: '#FDA4AF' } },
                    { id: 30, nameAr: 'ليموناضة', nameEn: 'Lemonade', light: { bg: '#FEFCE8', text: '#713F12', btn: '#EAB308' }, dark: { bg: '#1A1A02', text: '#FEF08A', btn: '#FACC15' }, grad: { from: '#CA8A04', to: '#FDE047' } },
                    { id: 31, nameAr: 'شفق قطبي', nameEn: 'Aurora', light: { bg: '#F0FDF4', text: '#064E3B', btn: '#22C55E' }, dark: { bg: '#021A10', text: '#DCFCE7', btn: '#4ADE80' }, grad: { from: '#16A34A', to: '#86EFAC' } },

                    { id: 36, nameAr: 'نعناع نيون', nameEn: 'Neon Mint', light: { bg: '#FAFAFA', text: '#171717', btn: '#14B8A6' }, dark: { bg: '#0A0A0A', text: '#FAFAFA', btn: '#2DD4BF' }, grad: { from: '#0D9488', to: '#5EEAD4' } },
                    { id: 37, nameAr: 'شعاب مرجانية', nameEn: 'Coral Reef', light: { bg: '#FFF1F2', text: '#881337', btn: '#F43F5E' }, dark: { bg: '#1A0208', text: '#FFE4E6', btn: '#FB7185' }, grad: { from: '#E11D48', to: '#FDA4AF' } },
                    { id: 38, nameAr: 'شفق المساء', nameEn: 'Evening Twilight', light: { bg: '#F8FAFC', text: '#0F172A', btn: '#8B5CF6' }, dark: { bg: '#050510', text: '#F8FAFC', btn: '#A78BFA' }, grad: { from: '#7C3AED', to: '#C4B5FD' } },
                    { id: 40, nameAr: 'أسود وذهب', nameEn: 'Black & Gold', light: { bg: '#FAFAFA', text: '#000000', btn: '#D97706' }, dark: { bg: '#000000', text: '#FFFFFF', btn: '#F59E0B' }, grad: { from: '#B45309', to: '#FCD34D' } },
                    { id: 41, nameAr: 'أميثيست', nameEn: 'Amethyst', light: { bg: '#FAF5FF', text: '#4C1D95', btn: '#7C3AED' }, dark: { bg: '#1A052E', text: '#F3E8FF', btn: '#8B5CF6' }, grad: { from: '#6D28D9', to: '#A78BFA' } },
                    { id: 42, nameAr: 'بطيخ منعش', nameEn: 'Fresh Watermelon', light: { bg: '#FFF1F2', text: '#831843', btn: '#F43F5E' }, dark: { bg: '#1A020D', text: '#FFE4E6', btn: '#FB7185' }, grad: { from: '#E11D48', to: '#FDA4AF' } },
                    { id: 43, nameAr: 'خلية نحل', nameEn: 'Honeycomb', light: { bg: '#FFFBEB', text: '#78350F', btn: '#D97706' }, dark: { bg: '#1A0C02', text: '#FEF3C7', btn: '#F59E0B' }, grad: { from: '#B45309', to: '#FCD34D' } },
                    { id: 44, nameAr: 'بحر هائج', nameEn: 'Stormy Sea', light: { bg: '#F1F5F9', text: '#0F172A', btn: '#334155' }, dark: { bg: '#01050A', text: '#F1F5F9', btn: '#475569' }, grad: { from: '#1E293B', to: '#64748B' } },
                    { id: 45, nameAr: 'مارشميلو', nameEn: 'Marshmallow', light: { bg: '#FAFAFA', text: '#3F3F46', btn: '#A1A1AA' }, dark: { bg: '#0D0D0E', text: '#FAFAFA', btn: '#D4D4D8' }, grad: { from: '#71717A', to: '#E4E4E7' } }
                ],
                init() { this.currentPalette = this.palettes[0]; },
                toggleDarkMode() { this.isDark = !this.isDark; },
                toggleLang() { this.lang = this.lang === 'ar' ? 'en' : 'ar'; },
                get currentBg() { return this.isDark ? this.currentPalette.dark.bg : this.currentPalette.light.bg; },
                get currentText() { return this.isDark ? this.currentPalette.dark.text : this.currentPalette.light.text; },
                get currentBtn() { return this.isDark ? this.currentPalette.dark.btn : this.currentPalette.light.btn; },
                copyPrompt() {
                    const p = this.currentPalette;
                    const text = `
Act as a professional UI/UX Developer. Please apply the following visual identity to my project with specific attention to the "Glow Aesthetic":

1. **Color Variables**:
   - Light Mode: BG [${p.light.bg}], Text [${p.light.text}], Primary [${p.light.btn}]
   - Dark Mode: BG [${p.dark.bg}], Text [${p.dark.text}], Primary [${p.dark.btn}]
   - Accents: Gradient From [${p.grad.from}] To [${p.grad.to}]

2. **The "Glow Aura" Effect**:
   - Implement a fixed background element (z-index: -1).
   - Style: Radial gradient using accent colors, positioned at center.
   - Effect: Apply 120px blur. 
   - Opacity: 15% in Light Mode, 25% in Dark Mode.

3. **UI Implementation**:
   - Use the Primary color for main buttons and progress bars.
   - Apply a 500ms smooth transition for all background and text color changes.
   - Containers should have 2xl to 3xl rounded corners with subtle backdrop-blur (10px).

4. **Tone**: Modern, high-end "Vibe Coding" aesthetic. Ensure high contrast for readability.
`;
                    navigator.clipboard.writeText(text).then(() => {
                        this.copySuccess = true;
                        setTimeout(() => this.copySuccess = false, 2500);
                    });
                }
            }
        }
    </script>
</body>
</html>
